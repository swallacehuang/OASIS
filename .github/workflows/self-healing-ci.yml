name: Self Healing CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_run:
    workflows: ["Python Package using Conda", "Dependabot Auto Merge"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  diagnose-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Create triage issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: ${run.name} #${run.run_number}`,
              body: `Automated triage created.\n\nWorkflow: ${run.name}\nRun: ${run.html_url}\nConclusion: ${run.conclusion}`,
              labels: ['ci','bug','auto-triage']
            });

  stale-pr-cleanup:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Label PR for checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-ci']
            });

  release-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Timestamp marker
        run: echo "Main branch updated successfully"
